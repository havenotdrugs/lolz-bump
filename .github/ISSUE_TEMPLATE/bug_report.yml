name: Bug report
description: Сообщить о дефекте
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Описание
      placeholder: Что произошло?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      placeholder: 1. ... 2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Окружение
      placeholder: OS, Python, Docker, версия проекта
